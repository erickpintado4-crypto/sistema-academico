{% extends "base.html" %}

{% block titulo %}Editar Nota{% endblock %}

{% block contenido %}

<h1>Editar Nota</h1>

<div class="card">
    <p><strong>Estudiante:</strong> {{ nota[1] }}</p>
    <p><strong>Evaluación:</strong> {{ nota[2] }}</p>

    <form action="/editar_nota/{{ nota[0] }}" method="POST">
        <input type="number" step="0.01" name="nota" value="{{ nota[3] }}" required>
        <button type="submit">Guardar cambios</button>
    </form>
</div>

{% endblock %}
